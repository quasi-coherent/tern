[workspace]
members = [
  ".",
  "tern-core",
  "tern-cli",
  "tern-derive",
  "tern-executor",
]

[workspace.package]
version = "4.0.0"
license = "MIT OR Apache-2.0"
edition = "2024"
repository = "https://github.com/quasi-coherent/tern"
keywords = ["embedded", "database", "migrations", "postgres", "mysql", "sqlite"]
categories = ["database"]
authors = ["Daniel Donohue <d.michael.donohue@gmail.com>"]

[workspace.dependencies]
tern-core = { version = "=4.0.0", path = "tern-core" }
tern-cli = { version = "=4.0.0", path = "tern-cli" }
tern-derive = { version = "=4.0.0", path = "tern-derive" }
tern-executor = { version = "=4.0.0", path = "tern-executor" }

chrono = { version = "0.4.44", features = ["serde"] }
futures-core = "0.3.31"
log = "0.4.29"
regex = "1.12.3"
sqlx = { version = "0.8.6", default-features = false }
thiserror = "2.0.18"

[package]
name = "tern"
readme = "README.md"
description = "Embedded database migrations in SQL or Rust."
version.workspace = true
license.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
sqlx_postgres = ["tern-core/sqlx", "tern-executor/sqlx_postgres"]
sqlx_mysql = ["tern-core/sqlx", "tern-executor/sqlx_mysql"]
sqlx_sqlite = ["tern-core/sqlx", "tern-executor/sqlx_sqlite"]

[dependencies]
tern-core = { workspace = true }
tern-cli = { workspace = true, optional = true }
tern-derive = { workspace = true }
tern-executor = { workspace = true }
